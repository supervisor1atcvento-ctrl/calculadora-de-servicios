<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Calculadora VENTO - Vista tipo Excel</title>
<style>
:root{--accent:#F28F17;--muted:#616160;--ok:#e8f5e9;--bad:#fdecea;}
body{font-family:Segoe UI, Roboto, Arial; margin:18px; color:#231f20;}
.container{max-width:980px;margin:0 auto;}
h1{font-size:20px;margin-bottom:6px;}
.controls{display:flex;gap:8px;align-items:center;margin-bottom:12px;}
input,select,button{padding:8px;border-radius:6px;border:1px solid #e9e9e9;}
table{width:100%;border-collapse:collapse;margin-top:8px;}
th,td{padding:8px;border:1px solid #eee;text-align:left;font-size:14px;}
th{background:#fafafa;}
.row-ok{background:var(--ok);}
.row-bad{background:var(--bad);}
.small{font-size:13px;color:var(--muted);}
.status{padding:10px;border-radius:8px;margin-top:8px;}
.btn{background:var(--accent);color:#fff;border:0;padding:8px 10px;border-radius:6px;cursor:pointer;}
.summary{margin-top:12px;padding:10px;border-radius:8px;border:1px solid #eee;}
.badge{font-weight:700;color:#fff;background:#444;padding:4px 8px;border-radius:6px;}
</style>
</head>
<body>
<div class="container">
  <h1>Calculadora VENTO - Vista tipo Excel</h1>
  <div class="small">Pega la fecha de factura y el km actual; la tabla calculará qué servicios aplican.</div>

  <div class="controls">
    <label>Fecha factura <input id="fechaFactura" type="date"></label>
    <label>Km actual <input id="kmActual" type="number" min="0" value="0"></label>
    <button id="btnCalc" class="btn">Calcular</button>
    <div style="margin-left:auto" class="small" id="vigenciaInfo">—</div>
  </div>

  <div id="tableWrap" style="display:none">
    <table id="svcTable">
      <thead>
        <tr>
          <th>#</th>
          <th>Km límite</th>
          <th>Meses</th>
          <th>Fecha límite</th>
          <th>Requerido</th>
          <th>Realizado</th>
          <th>Fecha realizado</th>
          <th>Km realizado</th>
          <th>Estado / Mensaje</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <div class="summary" id="summary">
      <div><span class="badge">Estado:</span> <span id="warrantyStatus">—</span></div>
      <div class="small" id="summaryDetails"></div>
    </div>
  </div>
</div>

<script>
const SERVICES = [
{num:1, km:300, months:1},{num:2, km:2000, months:3},{num:3, km:4000, months:6},
{num:4, km:6000, months:9},{num:5, km:9000, months:12},{num:6, km:12000, months:15},
{num:7, km:15000, months:18},{num:8, km:18000, months:21},{num:9, km:21000, months:24},
{num:10, km:24000, months:27},{num:11, km:27000, months:30},{num:12, km:30000, months:33},
{num:13, km:33000, months:36}
];

const $ = id => document.getElementById(id);
const addMonths = (dateStr, months) => { const d = new Date(dateStr); d.setMonth(d.getMonth()+months); return d; };
const fmt = d => d ? new Date(d).toLocaleDateString('es-MX') : '-';

$('btnCalc').addEventListener('click', buildTable);

function buildTable(){
  const invoiceDate = $('fechaFactura').value;
  let kmActual = Number($('kmActual').value || 0);
  if(!invoiceDate){ alert('Ingresa la fecha de factura'); return; }

  const vigDate = addMonths(invoiceDate, 36);
  const vigText = (new Date() > vigDate || kmActual > 33000) ? 'Garantía vencida' : `Válida hasta ${fmt(vigDate)} o 33,000 km`;
  $('vigenciaInfo').textContent = vigText;

  const tbody = document.querySelector('#svcTable tbody');
  tbody.innerHTML = '';
  const today = new Date();

  SERVICES.forEach(s => {
    const fechaLim = addMonths(invoiceDate, s.months);
    const requiredByKm = kmActual >= s.km;
    const requiredByDate = today >= fechaLim;
    const required = requiredByKm || requiredByDate;

    const tr = document.createElement('tr');
    tr.dataset.num = s.num;

    tr.innerHTML = `
      <td>${s.num}</td>
      <td>${s.km.toLocaleString()}</td>
      <td>${s.months}</td>
      <td>${fmt(fechaLim)}</td>
      <td><input type="checkbox" class="chkRequired" ${required ? 'checked' : ''}></td>
      <td><select class="selDone"><option value="no">No</option><option value="si">Sí</option></select></td>
      <td><input type="date" class="inpDate" disabled></td>
      <td><input type="number" class="inpKm" min="0" disabled></td>
      <td class="msg small"></td>
    `;
    tbody.appendChild(tr);
  });

  // enable table view
  $('tableWrap').style.display = 'block';
  attachRowHandlers(invoiceDate);
  recomputeSummary(invoiceDate);
}

function attachRowHandlers(invoiceDate){
  const rows = document.querySelectorAll('#svcTable tbody tr');
  rows.forEach((tr, idx) => {
    const selDone = tr.querySelector('.selDone');
    const inpDate = tr.querySelector('.inpDate');
    const inpKm = tr.querySelector('.inpKm');
    const chkReq = tr.querySelector('.chkRequired');
    const msg = tr.querySelector('.msg');

    selDone.addEventListener('change', () => {
      const done = selDone.value === 'si';
      inpDate.disabled = !done;
      inpKm.disabled = !done;
      if(!done){ inpDate.value=''; inpKm.value=''; msg.textContent=''; tr.classList.remove('row-bad','row-ok'); }
      recomputeSummary(invoiceDate);
    });

    inpDate.addEventListener('change', () => { validateRow(tr, invoiceDate); recomputeSummary(invoiceDate); });
    inpKm.addEventListener('input', () => { validateRow(tr, invoiceDate); recomputeSummary(invoiceDate); });
    chkReq.addEventListener('change', () => { recomputeSummary(invoiceDate); });
  });
}

function validateRow(tr, invoiceDate){
  const num = Number(tr.dataset.num);
  const svc = SERVICES.find(s=>s.num===num);
  const selDone = tr.querySelector('.selDone').value === 'si';
  const inpDate = tr.querySelector('.inpDate').value;
  const inpKm = Number(tr.querySelector('.inpKm').value || 0);
  const msg = tr.querySelector('.msg');

  msg.textContent = '';
  tr.classList.remove('row-bad','row-ok');

  if(selDone){
    // fecha >= factura
    if(new Date(inpDate) < new Date(invoiceDate)){ msg.textContent = 'Fecha < fecha factura'; tr.classList.add('row-bad'); return false; }
    // km >= 0 and basic check vs service km if required by km
    if(inpKm <= 0){ msg.textContent = 'Ingresa km'; tr.classList.add('row-bad'); return false; }
    // if km less than service limit but service was required by km, warn (but allow)
    if(inpKm < svc.km){ msg.textContent = `Km < límite (${svc.km.toLocaleString()}) — confirmar`; tr.classList.add('row-bad'); return true; }
    tr.classList.add('row-ok');
    return true;
  } else {
    // not done: if required and already overdue -> mark bad
    const fechaLim = addMonths(invoiceDate, svc.months);
    const today = new Date();
    const requiredByDate = today > fechaLim;
    if(requiredByDate){ msg.textContent = 'Requerido y no realizado — puede anular garantía'; tr.classList.add('row-bad'); return false; }
    return true;
  }
}

function recomputeSummary(invoiceDate){
  const rows = document.querySelectorAll('#svcTable tbody tr');
  let anyBad = false;
  const reasons = [];
  rows.forEach(tr => {
    const num = Number(tr.dataset.num);
    const svc = SERVICES.find(s=>s.num===num);
    const chkReq = tr.querySelector('.chkRequired').checked;
    const selDone = tr.querySelector('.selDone').value === 'si';
    const inpDate = tr.querySelector('.inpDate').value;
    const inpKm = Number(tr.querySelector('.inpKm').value || 0);
    const fechaLim = addMonths(invoiceDate, svc.months);
    const today = new Date();

    if(chkReq && !selDone){
      // if overdue by date or km -> reason
      const overdueByDate = today > fechaLim;
      if(overdueByDate){ anyBad = true; reasons.push(`Servicio ${num} requerido por fecha y no realizado (fecha límite ${fmt(fechaLim)})`); tr.querySelector('.msg').textContent = 'Requerido y NO realizado'; tr.classList.add('row-bad'); }
    }

    // run per-row validation to set classes/messages
    validateRow(tr, invoiceDate);
  });

  const statusEl = $('warrantyStatus');
  const detailsEl = $('summaryDetails');
  if(anyBad){
    statusEl.textContent = 'ANULADA';
    statusEl.style.color = '#b71c1c';
    detailsEl.innerHTML = reasons.map(r=>`• ${r}`).join('<br>');
  } else {
    statusEl.textContent = 'VIGENTE / OK';
    statusEl.style.color = '#2e7d32';
    detailsEl.textContent = 'No hay servicios obligatorios sin registrar que anulen la garantía.';
  }
}
</script>
</body>
</html>
