<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Calculadora VENTO — Servicios requeridos</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  /* Paleta VENTO (institucional) */
  --bg:#071028;
  --panel:#071827;
  --card:#0b1220;
  --muted:#9aa4b2;
  --vento-blue:#0f6cff;    /* color principal VENTO */
  --vento-orange:#f28f17;  /* color secundario VENTO */
  --success:#16a34a;
  --danger:#ef4444;
  --radius:12px;
  --shadow: 0 10px 30px rgba(2,6,23,0.6);
}
*{box-sizing:border-box}
body{
  font-family:Inter, system-ui, -apple-system, "Segoe UI", Roboto, Arial;
  margin:0;
  background:linear-gradient(180deg,var(--bg) 0%, #071827 60%);
  color:#e6eef8;
}
.app{max-width:1100px;margin:28px auto;padding:20px;}
.header{display:flex;gap:16px;align-items:center;margin-bottom:18px;}
.logo{
  width:56px;height:56px;border-radius:12px;
  background:linear-gradient(135deg,var(--vento-blue),#2b8cff);
  display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:18px;
  box-shadow:0 8px 30px rgba(15,108,255,0.18);
}
.title{font-size:20px;font-weight:700;margin:0;}
.subtitle{font-size:13px;color:var(--muted);margin-top:4px;}
.controls{display:flex;gap:10px;align-items:center;margin-left:auto;}
.input,select,button,textarea{padding:10px 12px;border-radius:10px;border:1px solid rgba(255,255,255,0.04);background:transparent;color:inherit;font-size:14px;}
.input[type="number"]{width:140px;}
.btn-primary{
  background:linear-gradient(90deg,var(--vento-blue),#2b8cff);
  color:#fff;border:0;cursor:pointer;padding:10px 14px;border-radius:10px;font-weight:700;
  box-shadow:0 8px 24px rgba(15,108,255,0.12);
}
.btn-ghost{background:transparent;border:1px solid rgba(255,255,255,0.06);color:var(--muted);cursor:pointer;padding:9px 12px;border-radius:10px;}
.grid{display:grid;grid-template-columns:1fr 320px;gap:18px;margin-top:18px;}
.card{background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;border:1px solid rgba(255,255,255,0.03);}
.kpi{display:flex;gap:12px;align-items:center;margin-bottom:12px;}
.kpi .item{flex:1;padding:12px;border-radius:10px;background:linear-gradient(180deg, rgba(255,255,255,0.02), transparent);text-align:center;}
.kpi .label{font-size:12px;color:var(--muted)}
.kpi .value{font-weight:700;font-size:18px;margin-top:6px}
.table-wrap{overflow:auto;border-radius:10px;margin-top:8px}
table{width:100%;border-collapse:collapse;font-size:14px;color:#dbeafe}
th,td{padding:10px;border-bottom:1px solid rgba(255,255,255,0.03);text-align:left;vertical-align:middle}
th{font-weight:600;color:var(--muted);font-size:13px;position:sticky;top:0;background:transparent}
.row-required{background:linear-gradient(90deg, rgba(242,143,23,0.06), transparent)}
.row-done{background:linear-gradient(90deg, rgba(16,185,129,0.06), transparent)}
.row-bad{background:linear-gradient(90deg, rgba(239,68,68,0.06), transparent)}
.small{font-size:13px;color:var(--muted)}
.inp{width:100%;padding:8px;border-radius:8px;border:1px solid rgba(255,255,255,0.04);background:transparent;color:inherit}
.msgCell{font-size:13px;color:var(--muted)}
.status-pill{display:inline-block;padding:8px 12px;border-radius:10px;font-weight:700;color:#071827;font-size:13px}
.status-ok{background:var(--success)}
.status-bad{background:var(--danger)}
.footer-note{margin-top:12px;font-size:13px;color:var(--muted)}
.hidden{display:none}
.tooltip{position:relative}
.tooltip:hover::after{content:attr(data-tip);position:absolute;left:50%;transform:translateX(-50%);bottom:calc(100% + 8px);background:#071827;color:#e6eef8;padding:8px;border-radius:8px;font-size:12px;white-space:nowrap;box-shadow:0 8px 24px rgba(2,6,23,0.6)}
@media (max-width:980px){ .grid{grid-template-columns:1fr} .controls{flex-wrap:wrap} }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">V</div>
    <div>
      <h1 class="title">Calculadora VENTO</h1>
      <div class="subtitle">Servicios requeridos según fecha de factura y km actual</div>
    </div>

    <div class="controls">
      <label class="small">Fecha factura
        <input id="fechaFactura" class="input" type="date" />
      </label>
      <label class="small">Km actual
        <input id="kmActual" class="input" type="number" min="0" value="0" />
      </label>
      <div style="display:flex;gap:8px;align-items:center">
        <button id="btnCalc" class="btn-primary">Calcular</button>
        <button id="btnReset" class="btn-ghost">Limpiar</button>
      </div>
    </div>
  </div>

  <div class="grid">
    <div class="card">
      <div class="kpi">
        <div class="item">
          <div class="label">Estado</div>
          <div id="warrantyBadge" class="status-pill status-ok">—</div>
        </div>
        <div class="item">
          <div class="label">Servicios requeridos</div>
          <div id="requiredCount" class="value">0</div>
        </div>
        <div class="item">
          <div class="label">Pendientes</div>
          <div id="pendingCount" class="value">0</div>
        </div>
      </div>

      <div class="table-wrap" role="region" aria-label="Tabla de servicios requeridos">
        <table id="svcTable" aria-live="polite">
          <thead>
            <tr>
              <th>#</th>
              <th>Km límite</th>
              <th>Meses</th>
              <th>Fecha límite</th>
              <th>Realizado</th>
              <th>Fecha realizado</th>
              <th>Km realizado</th>
              <th>Estado</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>

      <div id="msgArea" class="footer-note"></div>
    </div>

    <aside class="card" aria-live="polite">
      <div class="small">Resumen</div>
      <div style="margin-top:10px">
        <div><strong>Vigencia</strong> <div id="vigenciaInfo" class="small" style="margin-top:6px">—</div></div>
        <div style="margin-top:12px"><strong>Motivos / Observaciones</strong></div>
        <div id="reasons" class="small" style="margin-top:8px;color:var(--danger)"></div>
      </div>

      <div style="margin-top:12px" class="small">Interfaz adaptada a colores institucionales VENTO.</div>
    </aside>
  </div>
</div>

<script>
/* Servicios */
const SERVICES = [
  {num:1, km:300, months:1},{num:2, km:2000, months:3},{num:3, km:4000, months:6},
  {num:4, km:6000, months:9},{num:5, km:9000, months:12},{num:6, km:12000, months:15},
  {num:7, km:15000, months:18},{num:8, km:18000, months:21},{num:9, km:21000, months:24},
  {num:10, km:24000, months:27},{num:11, km:27000, months:30},{num:12, km:30000, months:33},
  {num:13, km:33000, months:36}
];

const $ = id => document.getElementById(id);
const tbody = document.querySelector('#svcTable tbody');
const addMonths = (dateStr, months) => { const d = new Date(dateStr); d.setMonth(d.getMonth()+months); return d; };
const fmt = d => d ? new Date(d).toLocaleDateString('es-MX') : '-';

let invoiceDate = null;
let kmActual = 0;
let state = []; // only required services will be stored here
let allServices = []; // full list with limits

const STORAGE_KEY = 'vento_calc_required_v4';

/* Persistence */
function saveState(){ localStorage.setItem(STORAGE_KEY, JSON.stringify({invoiceDate, kmActual, state})); $('msgArea').textContent = 'Guardado local.'; setTimeout(()=>$('msgArea').textContent='',1200); }
function loadState(){
  const raw = localStorage.getItem(STORAGE_KEY);
  if(!raw) return false;
  try{
    const obj = JSON.parse(raw);
    invoiceDate = obj.invoiceDate; kmActual = obj.kmActual; state = obj.state || [];
    $('fechaFactura').value = invoiceDate || '';
    $('kmActual').value = kmActual || 0;
    renderTable(); recomputeSummary();
    return true;
  }catch(e){ return false; }
}

/* UI actions */
$('btnCalc').addEventListener('click', () => {
  invoiceDate = $('fechaFactura').value;
  kmActual = Number($('kmActual').value || 0);
  if(!invoiceDate){ alert('Ingresa la fecha de factura'); return; }
  buildAllServices();
  buildRequiredList();
  renderTable();
  recomputeSummary();
  saveState();
});

$('btnReset').addEventListener('click', () => {
  if(!confirm('Limpiar todo y reiniciar?')) return;
  localStorage.removeItem(STORAGE_KEY);
  invoiceDate = null; kmActual = 0; state = []; allServices = [];
  $('fechaFactura').value=''; $('kmActual').value='0';
  tbody.innerHTML=''; recomputeSummary();
});

/* Build full service list with limits */
function buildAllServices(){
  allServices = SERVICES.map(s => {
    const fechaLimit = addMonths(invoiceDate, s.months);
    return { num: s.num, kmLimit: s.km, months: s.months, fechaLimit: fechaLimit.toISOString() };
  });
}

/* Build list of only required services (by date or km) */
function buildRequiredList(){
  const today = new Date();
  state = allServices.filter(s => {
    const requiredByKm = kmActual >= s.kmLimit;
    const requiredByDate = today >= new Date(s.fechaLimit);
    return requiredByKm || requiredByDate;
  }).map(s => ({ ...s, required: true, done:false, fecha:'', km:'' }));
}

/* Render table (only required services) */
function renderTable(){
  tbody.innerHTML = '';
  if(state.length === 0){
    const tr = document.createElement('tr');
    tr.innerHTML = `<td colspan="8" class="small">No hay servicios requeridos por fecha o km.</td>`;
    tbody.appendChild(tr);
    return;
  }

  state.forEach(s => {
    const tr = document.createElement('tr');
    tr.dataset.num = s.num;
    if(s.done) tr.classList.add('row-done');
    else tr.classList.add('row-required');

    // Inputs editable so advisor can enter fecha/km to dictaminar
    tr.innerHTML = `
      <td>${s.num}</td>
      <td>${s.kmLimit.toLocaleString()}</td>
      <td>${s.months}</td>
      <td>${fmt(s.fechaLimit)}</td>
      <td style="text-align:center">
        <select class="selDone">
          <option value="no" ${!s.done ? 'selected' : ''}>No</option>
          <option value="si" ${s.done ? 'selected' : ''}>Sí</option>
        </select>
      </td>
      <td><input class="inp inpDate" type="date" value="${s.fecha || ''}"></td>
      <td><input class="inp inpKm" type="number" min="0" value="${s.km || ''}"></td>
      <td class="msgCell small"></td>
    `;
    tbody.appendChild(tr);

    const selDone = tr.querySelector('.selDone');
    const inpDate = tr.querySelector('.inpDate');
    const inpKm = tr.querySelector('.inpKm');

    selDone.addEventListener('change', () => {
      s.done = selDone.value === 'si';
      renderRowState(tr,s); recomputeSummary(); saveState();
    });
    inpDate.addEventListener('change', () => { s.fecha = inpDate.value; validateRow(tr,s); recomputeSummary(); saveState(); });
    inpKm.addEventListener('input', () => { s.km = inpKm.value; validateRow(tr,s); recomputeSummary(); saveState(); });

    renderRowState(tr,s);
  });
}

/* Row visuals and validation */
function renderRowState(tr,s){
  tr.classList.remove('row-done','row-bad','row-required');
  if(s.done) tr.classList.add('row-done');
  else tr.classList.add('row-required');
  validateRow(tr,s);
}

function getLastRecordedKmBefore(num){
  const prev = state.filter(x => x.num < num && x.km).map(x => Number(x.km));
  if(prev.length === 0) return null;
  return Math.max(...prev);
}

function validateRow(tr,s){
  const msgCell = tr.querySelector('.msgCell');
  msgCell.textContent = '';
  tr.classList.remove('row-bad');

  // If advisor hasn't provided fecha or km yet, prompt to enter them to dictaminar
  if(!s.fecha || !s.km){
    if(!s.done){
      msgCell.textContent = 'Falta fecha y/o km para dictaminar';
      tr.classList.add('row-bad');
      return false;
    }
  }

  if(s.done){
    if(!s.fecha){ msgCell.textContent = 'Ingresa fecha'; tr.classList.add('row-bad'); return false; }
    if(new Date(s.fecha) < new Date(invoiceDate)){ msgCell.textContent = 'Fecha < fecha factura'; tr.classList.add('row-bad'); return false; }
    if(!s.km || Number(s.km) <= 0){ msgCell.textContent = 'Ingresa km válido'; tr.classList.add('row-bad'); return false; }
    const lastKm = getLastRecordedKmBefore(s.num);
    if(lastKm && Number(s.km) < lastKm){
      msgCell.textContent = `Km < último registrado (${lastKm}) — inconsistencia`;
      tr.classList.add('row-bad');
      return false;
    }
    const fechaLim = new Date(s.fechaLimit);
    const lateByDate = new Date(s.fecha) > fechaLim;
    if(lateByDate){
      msgCell.textContent = 'Registrado (fuera de plazo)';
      return true;
    }
    msgCell.textContent = 'Registrado';
    return true;
  } else {
    // not done but required and fecha/km provided -> we can determine procedencia
    if(s.fecha && s.km){
      msgCell.textContent = 'No procedente — servicio requerido y no realizado';
      tr.classList.add('row-bad');
      return false;
    }
    msgCell.textContent = 'Falta fecha y/o km para dictaminar';
    tr.classList.add('row-bad');
    return false;
  }
}

/* Helper to get textual state for export or display */
function getRowStateText(s){
  if(s.done){
    const fechaLim = new Date(s.fechaLimit);
    const lateByDate = new Date(s.fecha) > fechaLim;
    if(lateByDate) return 'Registrado (fuera de plazo)';
    return 'Registrado';
  } else {
    if(!s.fecha || !s.km) return 'Falta fecha y/o km';
    return 'No procedente — no realizado';
  }
}

/* Summary evaluation: aggregate a clear "Estado" message based on current inputs */
function recomputeSummary(){
  if(!invoiceDate){ $('warrantyBadge').textContent='—'; $('requiredCount').textContent='0'; $('pendingCount').textContent='0'; $('vigenciaInfo').textContent='—'; $('reasons').textContent=''; return; }
  const vigDate = addMonths(invoiceDate,36);
  $('vigenciaInfo').textContent = `Válida hasta ${fmt(vigDate)} o 33,000 km`;

  let required = state.length;
  let pending = state.filter(s => !s.done).length;

  // Priority for main Estado:
  // 1) If any required service missing fecha/km -> "Falta fecha y/o km para dictaminar"
  // 2) Else if any required service not done -> "No procedente — servicio requerido y no realizado"
  // 3) Else if any done but fuera de plazo -> "Registrado (fuera de plazo)"
  // 4) Else -> "Procedente — servicios registrados"

  const missingData = state.find(s => !s.fecha || !s.km);
  if(missingData){
    $('warrantyBadge').textContent = 'Falta fecha y/o km para dictaminar';
    $('warrantyBadge').className = 'status-pill status-bad';
    const list = state.filter(s => !s.fecha || !s.km).map(s => `Servicio ${s.num}: falta fecha y/o km`);
    $('reasons').innerHTML = list.map(r=>`• ${r}`).join('<br>');
  } else {
    const notDone = state.find(s => !s.done);
    if(notDone){
      $('warrantyBadge').textContent = 'No procedente — servicio requerido y no realizado';
      $('warrantyBadge').className = 'status-pill status-bad';
      const list = state.filter(s => !s.done).map(s => `Servicio ${s.num}: requerido y no realizado`);
      $('reasons').innerHTML = list.map(r=>`• ${r}`).join('<br>');
    } else {
      const late = state.find(s => {
        if(!s.fecha) return false;
        const fechaLim = new Date(s.fechaLimit);
        return new Date(s.fecha) > fechaLim;
      });
      if(late){
        $('warrantyBadge').textContent = 'Registrado (fuera de plazo)';
        $('warrantyBadge').className = 'status-pill status-bad';
        const list = state.filter(s => new Date(s.fecha) > new Date(s.fechaLimit)).map(s => `Servicio ${s.num}: realizado fuera de plazo (${fmt(s.fecha)})`);
        $('reasons').innerHTML = list.map(r=>`• ${r}`).join('<br>');
      } else {
        $('warrantyBadge').textContent = 'Procedente — servicios registrados';
        $('warrantyBadge').className = 'status-pill status-ok';
        $('reasons').textContent = 'Todos los servicios requeridos están registrados correctamente.';
      }
    }
  }

  $('requiredCount').textContent = required;
  $('pendingCount').textContent = pending;
}

/* Load on start */
window.addEventListener('load', () => {
  if(!loadState()){
    $('fechaFactura').value = '';
    $('kmActual').value = '0';
  } else {
    kmActual = Number($('kmActual').value || 0);
  }
});
</script>
</body>
</html>
